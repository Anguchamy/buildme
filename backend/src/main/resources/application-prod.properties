# Production overrides — all values from environment variables

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://app.build.me}

# Logging
logging.level.com.buildme=WARN
logging.level.root=WARN

# Flyway — enabled in prod, schema managed via migrations
spring.flyway.enabled=true

# Security
server.ssl.enabled=false
server.forward-headers-strategy=native

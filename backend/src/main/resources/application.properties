# Application
spring.application.name=buildme-backend
server.port=8080

# Multipart upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# Disable default static resource mappings (we register our own in WebMvcConfig)

# Local file storage (dev fallback when S3 not configured)
app.upload.local-dir=${user.home}/buildme-uploads

# Database (Supabase PostgreSQL — set env vars to point to Supabase)
# Supabase JDBC URL format: jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/buildme}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# Supabase requires SSL (ignored for localhost)
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# JWT
app.jwt.secret=your-very-long-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-security
app.jwt.access-token-expiry=3600000
app.jwt.refresh-token-expiry=604800000

# OpenAI
app.openai.api-key=${OPENAI_API_KEY:}


# Cloudflare R2 (S3-compatible)
# Set these env vars to enable R2 uploads; leave blank to use local storage
app.r2.account-id=${R2_ACCOUNT_ID:}
app.r2.access-key=${R2_ACCESS_KEY:}
app.r2.secret-key=${R2_SECRET_KEY:}
app.r2.bucket=${R2_BUCKET:buildme-media}
app.r2.public-url=${R2_PUBLIC_URL:}


# OAuth - Instagram
app.oauth.instagram.client-id=${INSTAGRAM_CLIENT_ID:}
app.oauth.instagram.client-secret=${INSTAGRAM_CLIENT_SECRET:}

# OAuth - TikTok
app.oauth.tiktok.client-key=${TIKTOK_CLIENT_KEY:}
app.oauth.tiktok.client-secret=${TIKTOK_CLIENT_SECRET:}

# OAuth - Facebook
app.oauth.facebook.app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}

# OAuth - Twitter
app.oauth.twitter.client-id=${TWITTER_CLIENT_ID:}
app.oauth.twitter.client-secret=${TWITTER_CLIENT_SECRET:}

# OAuth - LinkedIn
app.oauth.linkedin.client-id=${LINKEDIN_CLIENT_ID:}
app.oauth.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:}

# OAuth - YouTube
app.oauth.youtube.client-id=${YOUTUBE_CLIENT_ID:}
app.oauth.youtube.client-secret=${YOUTUBE_CLIENT_SECRET:}

# OAuth - Pinterest
app.oauth.pinterest.app-id=${PINTEREST_APP_ID:}
app.oauth.pinterest.app-secret=${PINTEREST_APP_SECRET:}

# Frontend
app.frontend.url=http://localhost:3000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Razorpay
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}
app.razorpay.plan-id-pro=${RAZORPAY_PLAN_PRO:plan_placeholder_pro}
app.razorpay.plan-id-agency=${RAZORPAY_PLAN_AGENCY:plan_placeholder_agency}

# Logging
logging.level.com.buildme=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
